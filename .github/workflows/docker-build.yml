# ============================================================
# Docker Build, SBOM & Security Scan — feedBack Demucs Server
# ============================================================
# Builds Docker image, generates SBOM, scans for vulnerabilities:
#   - On every pull request (build + scan only, no push)
#   - On every push to main branch (build + scan, then publish to GHCR)
#   - On demand via workflow_dispatch
#
# The pull_request trigger is deliberate: this workflow was silently failing on
# main for weeks (a dependency that needed a C compiler the image doesn't have),
# and nothing caught it because the image was only ever built AFTER merge. A build
# that only runs post-merge cannot gate anything.
# ============================================================

name: Docker Build + Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least privilege by DEFAULT. `permissions` is workflow-wide, so granting
# packages: write here would hand every PR run a GHCR-write token it has no use for.
# Only the publish job (main / dispatch, never a PR) asks for it.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  # ── Build + scan. Runs for EVERY event, including PRs. Never pushes, and never
  #    holds a token that could. ─────────────────────────────────────────────────
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload-sarif

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Local image tag
        id: tag
        run: echo "scan=${REPO_NAME,,}:${SHA}" >> "$GITHUB_OUTPUT"
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}

      # Build into the local docker daemon (`load`), never a registry. The scan steps
      # then read that local image — on a PR there is nothing pushed to pull back.
      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.tag.outputs.scan }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Does the image actually RUN? ────────────────────────────────────────
      #
      # A green build says the layers assembled. It says nothing about whether the thing
      # starts. We published an image that built perfectly and then crash-looped on its
      # first run, because a fresh named volume is created root-owned while the container
      # runs as uid 10001:
      #
      #     PermissionError: [Errno 13] Permission denied: '/app/cache/_roformer-models'
      #
      # That is exactly what `docker compose up -d` does, and no amount of building would
      # have caught it. So: start the container the way a user does, and require /health
      # to answer.
      #
      # The FRESH NAMED VOLUME is the load-bearing part of this test. Without it the
      # container writes to the image's own filesystem, the permission bug never fires,
      # and this test would happily pass on the very bug it exists to catch.
      #
      # SKIP_WARMUP=true: /health binds immediately and answers while the models load;
      # warming up would pull ~1.5 GB of weights we don't need in order to answer
      # "did the process survive its first write?".
      - name: Smoke test — the container must start and serve /health
        run: |
          set -euo pipefail
          docker volume rm -f smoke-cache >/dev/null 2>&1 || true
          docker run -d --name smoke \
            -e SKIP_WARMUP=true \
            -v smoke-cache:/app/cache \
            -p 7865:7865 \
            "${{ steps.tag.outputs.scan }}"

          ok=""
          for i in $(seq 1 60); do
            if curl -fsS --max-time 3 http://127.0.0.1:7865/health >/dev/null 2>&1; then
              ok=1; break
            fi
            # Fail fast rather than burning two minutes on a container that is already dead
            # (or, worse, on one that `restart: unless-stopped` is bouncing in a loop).
            state="$(docker inspect -f '{{.State.Status}}' smoke 2>/dev/null || echo gone)"
            if [ "$state" != "running" ]; then
              echo "::error::container is '$state' - it did not stay up"
              break
            fi
            sleep 2
          done

          echo "--- container logs ---"
          docker logs --tail 60 smoke 2>&1 || true
          echo "----------------------"

          if [ -z "$ok" ]; then
            echo "::error::/health never answered. The image builds but does not run."
            docker rm -f smoke >/dev/null 2>&1 || true
            docker volume rm -f smoke-cache >/dev/null 2>&1 || true
            exit 1
          fi

          echo "/health responded:"
          curl -fsS --max-time 5 http://127.0.0.1:7865/health

          # Prove the cache is actually WRITABLE as the unprivileged runtime user - the
          # precise thing that was broken. /health answering is necessary but not
          # sufficient: the server only touches the cache once a job arrives.
          docker exec smoke sh -c 'touch /app/cache/.write-probe && rm /app/cache/.write-probe' \
            || { echo "::error::/app/cache is not writable by the runtime user"; exit 1; }
          echo "cache dir is writable by the runtime user"

          docker rm -f smoke >/dev/null 2>&1 || true
          docker volume rm -f smoke-cache >/dev/null 2>&1 || true

      - name: Create output directory
        run: mkdir -p sbom/

      # ── SBOM Generation ──────────────────────────────────────────────────
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ steps.tag.outputs.scan }}
          format: cyclonedx-json
          output-file: sbom/sbom-docker-cyclonedx.json

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ steps.tag.outputs.scan }}
          format: spdx-json
          output-file: sbom/sbom-docker-spdx.json

      # ── Vulnerability Scanning ──────────────────────────────────────────
      - name: Scan Docker image with Grype
        id: scan
        uses: anchore/scan-action@869c549e657a088dc0441b08ce4fc0ecdac2bb65
        with:
          image: ${{ steps.tag.outputs.scan }}
          fail-build: false
          severity-cutoff: medium

      # Fork PRs get a READ-ONLY GITHUB_TOKEN, so `security-events: write` is not
      # actually granted and this step 403s — failing the whole check even though the
      # build and the scan both passed. That would block exactly the contributions we
      # want (this repo already has open PRs from forks). Skip the upload there; the
      # scan still runs, and the human-readable report is still uploaded as an artifact
      # below, so a fork PR loses the Security-tab entry but nothing else.
      - name: Upload SARIF report to GitHub
        if: >-
          steps.scan.outputs.sarif != '' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype

      - name: Install Grype CLI
        id: grype-cli
        uses: anchore/scan-action/download-grype@869c549e657a088dc0441b08ce4fc0ecdac2bb65

      - name: Generate human-readable scan report
        if: success() || failure()
        run: |
          ${{ steps.grype-cli.outputs.cmd }} ${{ steps.tag.outputs.scan }} --scope all-layers -o table > sbom/vulnerability-report.txt || true
          echo "=== Vulnerability Report ==="
          cat sbom/vulnerability-report.txt

      - name: Upload SBOM and scan results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: success() || failure()
        with:
          name: sbom-and-scan-results
          path: sbom/
          retention-days: 30

  # ── Publish. main / manual only — a PR can never reach this job, so a PR run's
  #    token never carries packages: write. Reuses the build cache, so this is a
  #    layer-cache replay rather than a second full build. ────────────────────────
  publish:
    if: github.event_name != 'pull_request'
    needs: build-and-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      # GHCR requires lowercase repository names
      - name: Lowercase repo for GHCR tag
        id: tag
        run: |
          REPO_LC="${REPO_OWNER,,}/${REPO_NAME,,}"
          echo "image=ghcr.io/${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "tag=ghcr.io/${REPO_LC}:${SHA}" >> "$GITHUB_OUTPUT"
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SHA: ${{ github.sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.tag }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:latest', steps.tag.outputs.image) || '' }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
